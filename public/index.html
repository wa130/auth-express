<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simple system auth</title>

    <style>
        body {
            background: rgb(10, 10, 10);
            font-family: Arial, Helvetica, sans-serif;
        }
        .auth {
            display: flex;
            justify-content: center;
            width: 100%;
            height: 100%;
            margin-top: 30%;
        }

        .auth .login-form {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            width: 300px;
            background: rgb(5, 5, 5);
            padding: 16px 32px;
            border-radius: 16px;
            box-shadow: 0 0 2px rgba(200, 200, 200, 0.16);
        }
        .auth .login-form h2 {
            color: white;
            font-size: 32px;
            margin-bottom: 48px;
        }
        .auth .login-form input {
            width: 100%;
            height: 24px;
            margin-bottom: 24px;
            border-radius: 5px;
        }
        .auth .login-form span {
            margin-top: 32px;
            color: white;
            margin-bottom: 24px;
            font-size: 13px;
            display: flex;
            gap: 8px;
        }
        .auth .login-form .cta-login {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
        }
        .register-from {
            display: none;
        }
    </style>
</head>
<body>

        <div class="auth">
            <div class="login-form">
                <h2>Login</h2>
                <input type="gmail" placeholder="Gmail">
                <input type="text" placeholder="Password">
                <span>Belum punya akun?<a href="#">Daftar Sekarang</a></span>
                <button class="cta-login">Login</button>
            </div>
            <div class="register-form">

            </div>
        </div>

</body>
</html>
